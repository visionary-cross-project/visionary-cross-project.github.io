# =========================================================
# Visionary Cross Project — site settings
# =========================================================
# This repository holds the front matter and back matter for the
# Visionary Cross Project. Each cross (Ruthwell, Bewcastle, Brussels)
# lives in its own repository; set the base URLs below so the shared
# navigation can link out to them once they are published.

title: Visionary Cross Project
email: humanitiesinnovationlab@gmail.com
description: >-
  A collaborative digital edition exploring the 3D models of the
  Ruthwell, Bewcastle, and Brussels crosses.

# baseurl: this is the user/org page repo, served from the domain root, so
# baseurl stays empty. Links that use relative_url then resolve directly under
# the root, e.g. /frontmatter/home.html. Local `jekyll serve` previews at
# http://localhost:4000/.
baseurl: ""
url: "https://visionary-cross-project.github.io"

# ---------------------------------------------------------
# Per-cross repositories. Each cross is published as a project site under this
# same domain (visionary-cross-project.github.io/<cross>), so these are
# root-relative paths. The shared nav appends page paths like /intro.html to
# them, producing e.g. /ruthwell/intro.html.
# ---------------------------------------------------------
crosses:
  ruthwell: "/ruthwell"
  bewcastle: "/bewcastle"
  brussels: "/brussels"

# Shared header (rendered by _includes/header.html via the layout). header_image
# is a baseurl-relative path, so each repo points at its own /assets/img file.
header_title: "Visionary Cross Project"
header_image: "/assets/img/header.jpg"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Sass: partials live in _sass/, compiled via assets/css/main.scss.
# "expanded" keeps the generated CSS readable; use "compressed" to minify.
sass:
  style: expanded

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - README.md
